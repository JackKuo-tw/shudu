name: Test Shudu

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build Browser Extension
        run: |
          cd browser_ext
          make

      - name: Upload Browser Extension Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-extensions
          path: browser_ext/*.zip

      - name: Run Test
        run: |
          OUTPUT=$(node src/shudu.js "燕燕于飞，差池其羽。")
          echo "Output: $OUTPUT"
          if [ "$OUTPUT" = "燕燕于飛，差池其羽。" ]; then
            echo "Test passed!"
          else
            echo "Test failed! Expected '燕燕于飛，差池其羽。' but got '$OUTPUT'"
            exit 1
          fi

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build Browser Extension
        run: |
          cd browser_ext
          make

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: browser_ext/*.zip
          generate_release_notes: true
